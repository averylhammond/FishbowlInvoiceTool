name: Code Coverage Workflow

# Run the coverage pipeline on pull requests to main (so Codecov can post the PR
# coverage comment/diff) and on pushes to main (so Codecov records the main-branch
# baseline that PRs are compared against).
on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

# Allow for the job to be ran manually from the GitHub Actions UI
  workflow_dispatch:

# Read-only access is all this job needs: it runs the tests and hands the report
# to Codecov, which hosts the badge and posts PR comments via its GitHub App.
permissions:
  contents: read

jobs:
  test:

    # Give the job a name to link into the Github Rules UI
    name: Code Coverage CI Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Set up Python environment
    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-path: requirements/dev.txt

    # Install development project dependencies
    # Note: pkg-resources needed with latest python
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt

    # Run unit tests with pytest, and generate code coverage report xml
    # Note: replace --cov-report=xml with --cov-report=html to generate HTML report instead
    # which can be easier to manual use
    - name: Run tests and code coverage
      run: |
        pytest --cov=./ --cov-report=xml tests/*

    # Upload the coverage report to Codecov, which serves the README badge and
    # posts the PR coverage comment. CODECOV_TOKEN is the repo upload token.
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
